workflows:
  tousalni-android:
    name: Tousalni Android Build
    max_build_duration: 60
    environment:
      node: 20
      expo_sdk: 54
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include_source: true
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Prebuild
        script: |
          npx expo prebuild --platform android --clean
      - name: Build APK
        script: |
          cd android
          ./gradlew assembleRelease
    artifacts:
      - path: android/app/build/outputs/apk/release/app-release.apk
        name: tousalni-apk
    publishing:
      email:
        recipients:
          - yakhou365@gmail.com
